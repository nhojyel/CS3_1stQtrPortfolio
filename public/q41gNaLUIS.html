<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d14;
      --surface: #16161f;
      --card: #1e1e2e;
      --border: #2a2a3d;
      --accent: #f5c518;
      --accent2: #e8a000;
      --text: #e8e8f0;
      --muted: #7a7a99;
      --input-bg: #12121a;
      --star-empty: #3a3a52;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at top left, #1e1a2e 0%, #0d0d14 50%, #0a1220 100%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    .site-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .site-header .label {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .site-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 900;
      line-height: 1.05;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .site-header p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      margin-bottom: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--text);
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      border-color: var(--accent);
    }

    select {
      background-image: none;
      padding-right: 14px;
    }

    .stars {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    .star {
      font-size: 28px;
      cursor: pointer;
      color: var(--star-empty);
      transition: color 0.15s, transform 0.15s;
      user-select: none;
      line-height: 1;
    }

    .star:hover,
    .star.active {
      color: var(--accent);
    }

    .star:hover {
      transform: scale(1.15);
    }

    .btn-add {
      width: 100%;
      background: var(--accent);
      color: #0d0d14;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 14px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-add:hover { background: var(--accent2); }
    .btn-add:active { transform: scale(0.98); }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--accent);
      color: #0d0d14;
      font-weight: 600;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 50px;
      z-index: 999;
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title .count {
      background: var(--accent);
      color: #0d0d14;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .movie-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .movie-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      animation: slideIn 0.3s cubic-bezier(.34,1.56,.64,1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .movie-info { flex: 1; min-width: 0; }

    .movie-title {
      font-weight: 600;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .movie-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    .movie-stars {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }

    .movie-stars span {
      font-size: 16px;
      color: var(--star-empty);
    }

    .movie-stars span.lit {
      color: var(--accent);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 14px;
    }
    .empty-state .icon { font-size: 36px; margin-bottom: 10px; }

    input.error, select.error { border-color: #e05c5c; }
    .err-msg { color: #e05c5c; font-size: 11px; margin-top: 4px; }
  </style>
</head>
<body>
<div class="wrapper">

  <header class="site-header">
    <h1>Movie Tracker</h1>
    <br>
    <h2>Welcome, Roy! Anything to track today?</h2>
  </header>

  <div class="card">
    <h2>Add a Movie</h2>

    <div class="field">
      <label for="title">Title</label>
      <input type="text" id="title" placeholder="e.g. Frozen" autocomplete="off"/>
      <div class="err-msg" id="title-err"></div>
    </div>

    <div class="field">
      <label for="year">Year</label>
      <input type="number" id="year" placeholder="e.g. 2010" min="1888" max="2099"/>
      <div class="err-msg" id="year-err"></div>
    </div>

    <div class="field">
      <label for="genre">Genre</label>
      <select id="genre">
        <option value="Action">Action</option>
        <option value="Adventure">Adventure</option>
        <option value="Animation">Animation</option>
        <option value="Comedy">Comedy</option>
        <option value="Crime">Crime</option>
        <option value="Documentary">Documentary</option>
        <option value="Drama">Drama</option>
        <option value="Fantasy">Fantasy</option>
        <option value="Horror">Horror</option>
        <option value="Musical">Musical</option>
        <option value="Mystery">Mystery</option>
        <option value="Romance">Romance</option>
        <option value="Sci-Fi">Sci-Fi</option>
        <option value="Thriller">Thriller</option>
        <option value="Western">Western</option>
      </select>
    </div>

    <div class="field">
      <label>Rating</label>
      <div class="stars" id="stars-input" role="group" aria-label="Rating">
        <span class="star" data-val="1" title="1 star">★</span>
        <span class="star" data-val="2" title="2 stars">★</span>
        <span class="star" data-val="3" title="3 stars">★</span>
        <span class="star" data-val="4" title="4 stars">★</span>
        <span class="star" data-val="5" title="5 stars">★</span>
      </div>
      <div class="err-msg" id="rating-err"></div>
    </div>

    <button class="btn-add" id="addBtn">Add Movie</button>
  </div>

  <div class="section-title">
    Movie List <span class="count" id="movie-count">0</span>
  </div>
  <div class="movie-list" id="movie-list"></div>

</div>

<div class="toast" id="toast">🎬 Movie added!</div>

<script>
  const STORAGE_KEY = 'movies';
  let selectedRating = 0;

  const starsEl = document.getElementById('stars-input');
  const starNodes = starsEl.querySelectorAll('.star');

  function updateStarDisplay(rating) {
    starNodes.forEach(s => {
      s.classList.toggle('active', parseInt(s.dataset.val) <= rating);
    });
  }

  starNodes.forEach(star => {
    const val = parseInt(star.dataset.val);

    star.addEventListener('mouseover', () => updateStarDisplay(val));
    star.addEventListener('mouseout', () => updateStarDisplay(selectedRating));

    star.addEventListener('click', () => {
      selectedRating = val;
      updateStarDisplay(selectedRating);
      document.getElementById('rating-err').textContent = '';
    });
  });

  function loadMovies() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  }

  function saveMovies(movies) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(movies));
  }

  function renderList() {
    const movies = loadMovies();
    const listEl = document.getElementById('movie-list');
    const countEl = document.getElementById('movie-count');
    countEl.textContent = movies.length;

    if (movies.length === 0) {
      listEl.innerHTML = `<div class="empty-state"><div class="icon">🎞️</div>No movies yet. Add your first one!</div>`;
      return;
    }

    listEl.innerHTML = movies.map((m, i) => `
      <div class="movie-item" style="animation-delay:${i * 0.04}s">
        <div class="movie-info">
          <div class="movie-title">${escapeHtml(m.title)} <span style="color:var(--muted);font-weight:400">(${escapeHtml(m.year)})</span></div>
          <div class="movie-meta">${escapeHtml(m.genre)}</div>
        </div>
        <div class="movie-stars" aria-label="Rating: ${m.rating} out of 5">
          ${[1,2,3,4,5].map(n => `<span class="${n <= parseInt(m.rating) ? 'lit' : ''}">★</span>`).join('')}
        </div>
      </div>
    `).join('');
  }

  document.getElementById('addBtn').addEventListener('click', () => {
    const titleEl = document.getElementById('title');
    const yearEl  = document.getElementById('year');
    const genreEl = document.getElementById('genre');
    let valid = true;

    ['title','year','rating'].forEach(f => {
      document.getElementById(f + '-err').textContent = '';
    });
    [titleEl, yearEl, genreEl].forEach(el => el.classList.remove('error'));

    if (!titleEl.value.trim()) {
      document.getElementById('title-err').textContent = 'Please enter a movie title.';
      titleEl.classList.add('error');
      valid = false;
    }

    const yr = parseInt(yearEl.value);
    if (!yearEl.value || isNaN(yr) || yr < 1888 || yr > 2099) {
      document.getElementById('year-err').textContent = 'Please enter a valid year (1888–2099).';
      yearEl.classList.add('error');
      valid = false;
    }

    if (!selectedRating) {
      document.getElementById('rating-err').textContent = 'Please select a rating.';
      valid = false;
    }

    if (!valid) return;

    const movie = {
      title:  titleEl.value.trim(),
      year:   yearEl.value.trim(),
      genre:  genreEl.value,
      rating: String(selectedRating)
    };

    const movies = loadMovies();
    movies.push(movie);
    saveMovies(movies);
    renderList();

    titleEl.value = '';
    yearEl.value  = '';
    genreEl.selectedIndex = 0;
    selectedRating = 0;
    updateStarDisplay(0);

    showToast();
  });

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function escapeHtml(str) {  //so the codw gets sanitizedd before entering stuff ig
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  renderList();
</script>
</body>
</html>
